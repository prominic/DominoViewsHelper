name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install local dependencies
      run: |
        mvn install:install-file -Dfile=lib/notes-10.0.jar -DgroupId=lotus.notes -DartifactId=notes -Dversion=10.0 -Dpackaging=jar
        mvn install:install-file -Dfile=lib/glassfish-corba-omgapi-4.2.1.jar -DgroupId=org.glassfish.corba -DartifactId=glassfish-corba-omgapi -Dversion=4.2.1 -Dpackaging=jar
        mvn install:install-file -Dfile=lib/gja-0.8.5.jar -DgroupId=net.prominic -DartifactId=gja -Dversion=0.8.5 -Dpackaging=jar

    - name: Build with Maven
      run: mvn clean package -B

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: target/ViewsHelper-*.jar
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
